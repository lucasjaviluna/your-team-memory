services:

  # ── PostgreSQL + pgvector ────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: team-memory-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Solo accesible internamente entre contenedores — no expuesto a la red
    expose:
      - "5432"

  # ── Ollama ───────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: team-memory-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    expose:
      - "11434"

  # ── MCP Server (SSE — red interna / VPN) ────────────────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: team-memory-mcp
    restart: unless-stopped
    environment:
      MCP_TRANSPORT:      http
      MCP_PORT:           ${MCP_PORT:-3100}
      MCP_SERVER_NAME:    ${MCP_SERVER_NAME:-team-memory}
      DB_HOST:            postgres
      DB_PORT:            5432
      DB_USER:            ${DB_USER}
      DB_PASSWORD:        ${DB_PASSWORD}
      DB_NAME:            ${DB_NAME}
      OLLAMA_URL:         http://ollama:11434
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      OLLAMA_CHAT_MODEL:  ${OLLAMA_CHAT_MODEL:-llama3}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    # Puerto expuesto a la red interna — accesible solo via VPN
    ports:
      - "${MCP_PORT:-3100}:3100"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  ollama_data:
